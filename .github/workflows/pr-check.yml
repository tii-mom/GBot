name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      ENABLE_TEST_ENDPOINTS: "true"
      TEST_ENDPOINT_TOKEN: ci_test_secret

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Static Verification
        run: npm run verify:static-v1

      - name: Runtime UI Alignment Verification
        run: node scripts/verify-runtime-ui-alignment.mjs

      - name: Work Report Verification
        run: npm run verify:work-report

      - name: Build
        run: npm run build

      - name: Setup temporary D1 and run migrations
        working-directory: apps/api-worker
        run: |
          # Apply migrations to the local development D1 database
          npx wrangler d1 migrations apply DB --local --persist-to=.wrangler-temp

      - name: Start Wrangler Local Dev Server
        working-directory: apps/api-worker
        run: |
          npx wrangler dev \
            --port 8787 \
            --persist-to=.wrangler-temp \
            --var APP_ENV:test \
            --var ENABLE_TEST_ENDPOINTS:true \
            --var TEST_ENDPOINT_TOKEN:${TEST_ENDPOINT_TOKEN} &
          echo "WRANGLER_PID=$!" >> $GITHUB_ENV

      - name: Wait for local server /health
        run: |
          attempts=0
          until curl -s http://127.0.0.1:8787/me > /dev/null || [ $attempts -eq 12 ]; do
            echo "Waiting for dev server to start..."
            sleep 2
            attempts=$((attempts + 1))
          done
          if [ $attempts -eq 12 ]; then
            echo "Server failed to start in time"
            exit 1
          fi

      - name: Run Integration Tests
        env:
          VITE_API_BASE: http://127.0.0.1:8787
          TEST_ENDPOINT_TOKEN: ${{ env.TEST_ENDPOINT_TOKEN }}
        run: npm run verify:integration-v1

      - name: Run Launch Gate Verification
        env:
          VITE_API_BASE: http://127.0.0.1:8787
          TEST_ENDPOINT_TOKEN: ${{ env.TEST_ENDPOINT_TOKEN }}
        run: npm run verify:launch-v1

      - name: Stop Wrangler Server
        if: always()
        run: |
          if [ -n "$WRANGLER_PID" ]; then
            kill $WRANGLER_PID
          fi
